server {
    listen 80;
    server_name stats.judemakes.dev;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name stats.judemakes.dev;

    ssl_certificate /etc/letsencrypt/live/stats.judemakes.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stats.judemakes.dev/privkey.pem;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    # Optional if your proxy or CDN already exposes country data:
    # proxy_set_header X-Geo-Country-Code $geoip2_data_country_code;
    # proxy_set_header CF-IPCountry $http_cf_ipcountry;

    location = /api/download/vorn-voice {
        auth_basic off;
        proxy_pass http://127.0.0.1:3010;
    }

    location = /api/metrics {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd-vorn-stats;
        proxy_pass http://127.0.0.1:3010;
    }

    location / {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd-vorn-stats;
        proxy_pass http://127.0.0.1:3010;
    }
}
